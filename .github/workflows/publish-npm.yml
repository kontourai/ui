name: Publish NPM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    steps:
      - name: Checkout Console Kit
        uses: actions/checkout@v6
        with:
          path: ui

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install
        run: npm ci --no-fund --no-audit
        working-directory: ui

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: ui

      - name: Verify
        run: npm run verify
        working-directory: ui

  publish:
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Console Kit
        uses: actions/checkout@v6
        with:
          path: ui

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install
        run: npm ci --no-fund --no-audit
        working-directory: ui

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: ui

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if [ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v${PACKAGE_VERSION}" >&2
            exit 1
          fi
        working-directory: ui

      - name: Check published version
        id: published
        run: |
          PACKAGE_NAME=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi
        working-directory: ui

      - name: Publish public package
        if: steps.published.outputs.published != 'true'
        run: npm publish --access public --provenance
        working-directory: ui
