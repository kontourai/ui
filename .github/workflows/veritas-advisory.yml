name: Veritas Advisory Governance

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readiness:
    name: Advisory readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
      - name: Install repository dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci
      - name: Produce advisory Veritas readiness
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="$(git rev-parse HEAD^)"
          fi
          set +e
          npm exec --yes --package=@kontourai/veritas@1.5.2 -- veritas readiness \
            --check evidence \
            --run-id "github-${{ github.run_id }}" \
            --source-ref "${{ github.event_name }}:${{ github.ref }}" \
            --changed-from "$BASE_SHA" \
            --changed-to "$HEAD_SHA"
          status=$?
          set -e
          echo "Veritas advisory readiness exit: $status" >> "$GITHUB_STEP_SUMMARY"
          echo "This rollout is observe-only; promotion to blocking enforcement requires a separate approval." >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Veritas evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: veritas-readiness-${{ github.run_id }}
          path: .kontourai/veritas/evidence/
          if-no-files-found: warn
